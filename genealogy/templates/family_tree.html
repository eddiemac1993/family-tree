<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Legacy Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            overflow: hidden;
            touch-action: none;
        }

        #layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f8fafc;
        }

        @media (min-width: 768px) {
            #layout {
                flex-direction: row;
                height: calc(100vh - 70px);
            }
        }

        #tree-container {
            flex: 1;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        /* Side Panel / Bottom Sheet */
        #details-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 75vh;
            background: white;
            border-top: 1px solid #e2e8f0;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -15px 35px rgba(0,0,0,0.15);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            #details-panel {
                position: relative;
                width: 400px;
                height: 100%;
                transform: none;
                border-top: none;
                border-left: 1px solid #e2e8f0;
                border-radius: 0;
                box-shadow: -10px 0 30px rgba(0,0,0,0.03);
            }
        }

        #details-panel.open {
            transform: translateY(0);
        }

        #backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #backdrop.visible { opacity: 1; pointer-events: auto; }

        /* Node Visuals */
        .node-card { cursor: pointer; transition: opacity 0.3s ease, filter 0.3s ease; }
        .node-card rect { stroke-width: 2px; rx: 20; ry: 20; }
        
        /* Color Coding */
        .node-card.male rect { fill: #f0f7ff; stroke: #3b82f6; }
        .node-card.female rect, .node-card.female-daughter rect { fill: #fff1f2; stroke: #f43f5e; }
        .node-card.female-spouse rect { fill: #f5f3ff; stroke: #8b5cf6; } /* Lavender for Wives */
        .node-card.other rect { fill: #f8fafc; stroke: #94a3b8; }
        
        .node-card.active rect { stroke-width: 5px; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.12)); }

        /* Links */
        .link { fill: none; stroke-width: 2.5px; transition: opacity 0.3s ease, stroke-width 0.3s ease; opacity: 0.12; }
        .link.paternal { stroke: #3b82f6; }
        .link.maternal { stroke: #f43f5e; stroke-dasharray: 6 4; }
        .link.spouse { stroke: #10b981; stroke-dasharray: 4 4; opacity: 0.3; }
        .link.highlighted { opacity: 0.95; stroke-width: 4.5px; }
        .node-card.dimmed { opacity: 0.15; filter: grayscale(90%) blur(0.5px); }

        .legend {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 14px;
            font-size: 11px;
            z-index: 10;
        }

        .detail-header {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            padding: 30px 24px;
            color: white;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div id="backdrop" onclick="closeDetails()"></div>

    <nav class="h-[70px] bg-white border-b border-slate-200 flex items-center px-4 md:px-8 justify-between relative z-[110]">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </div>
            <h1 class="text-lg font-bold text-slate-800 hidden sm:block">Family Legacy</h1>
        </div>
        
        <div class="flex-1 flex items-center gap-2 max-w-2xl mx-3 md:mx-10">
            <div class="relative min-w-[120px] md:min-w-[160px]">
                <select id="generation-select" class="block w-full pl-3 pr-8 py-2 text-xs md:text-sm border border-slate-200 rounded-xl appearance-none bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium text-slate-700">
                    <option value="all">All Generations</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" autocomplete="off" placeholder="Search members..." class="block w-full pl-10 pr-4 py-2 border border-slate-200 rounded-2xl leading-5 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all shadow-inner">
                <div id="search-results" class="absolute hidden w-full bg-white mt-2 border border-slate-200 rounded-2xl shadow-2xl z-[120] overflow-hidden"></div>
            </div>
        </div>
    </nav>

    <div id="layout">
        <div id="tree-container">
            <div class="legend space-y-2 md:space-y-3">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                    <span class="font-bold text-slate-500 text-[10px] uppercase">Male / Son</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-pink-500"></div>
                    <span class="font-bold text-slate-500 text-[10px] uppercase">Female / Daughter</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-purple-500"></div>
                    <span class="font-bold text-slate-500 text-[10px] uppercase">Wife / Spouse</span>
                </div>
                <div class="pt-2 border-t border-slate-200">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-0 border-t-2 border-emerald-500 border-dotted"></div>
                        <span class="font-bold text-slate-500 text-[10px] uppercase">Marriage Link</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="details-panel">
            <div class="md:hidden flex flex-col items-center py-4 cursor-pointer" onclick="closeDetails()">
                <div class="w-10 h-1.5 bg-slate-200 rounded-full mb-1"></div>
            </div>
            
            <div id="details-content" class="flex-1 overflow-y-auto">
                <div class="flex flex-col items-center justify-center h-full text-slate-300 p-12 text-center">
                    <svg class="w-12 h-12 mb-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <p class="text-sm font-semibold text-slate-400">Select a family member</p>
                </div>
            </div>
        </div>
    </div>

    {{ family_data|json_script:"family-data" }}

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataElement = document.getElementById("family-data");
            if (!dataElement) return;

            const familyData = JSON.parse(dataElement.textContent || "[]");
            if (familyData.length === 0) return;

            const isMobile = () => window.innerWidth < 768;
            const cardWidth = 220;
            const cardHeight = 85;

            const svg = d3.select("#tree-container").append("svg").attr("width", "100%").attr("height", "100%").style("touch-action", "none");
            const zoomLayer = svg.append("g");
            const zoom = d3.zoom().scaleExtent([0.05, 4]).on("zoom", (event) => zoomLayer.attr("transform", event.transform));
            svg.call(zoom);

            const peopleById = {};
            familyData.forEach(p => { peopleById[p.id] = { ...p, children: [] }; });

            const roots = [];
            familyData.forEach(p => {
                const pId = p.fatherId || p.motherId;
                if (pId && peopleById[pId]) { peopleById[pId].children.push(peopleById[p.id]); }
                else { roots.push(peopleById[p.id]); }
            });

            const treeData = roots.length === 1 ? roots[0] : { id: "v-root", name: "Root", children: roots };
            const hierarchyRoot = d3.hierarchy(treeData);
            const treeGenerator = d3.tree().nodeSize([280, 240]);
            treeGenerator(hierarchyRoot);

            const allNodes = hierarchyRoot.descendants().filter(d => d.data.id !== "v-root");
            const nodePos = {};
            allNodes.forEach(d => { nodePos[d.data.id] = d; });

            // Dropdown setup
            const maxDepth = d3.max(allNodes, d => d.depth);
            const genSelect = document.getElementById('generation-select');
            for (let i = 0; i <= maxDepth; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i === 0 ? "Roots (Gen 0)" : `Generation ${i}`;
                genSelect.appendChild(option);
            }

            const fatherLinks = familyData.filter(p => p.fatherId && nodePos[p.id] && nodePos[p.fatherId]).map(p => ({ source: nodePos[p.fatherId], target: nodePos[p.id], type: 'paternal' }));
            const motherLinks = familyData.filter(p => p.motherId && nodePos[p.id] && nodePos[p.motherId]).map(p => ({ source: nodePos[p.motherId], target: nodePos[p.id], type: 'maternal' }));
            
            const spouseLinks = [];
            const seenSpouses = new Set();
            familyData.forEach(p => {
                (p.spouseIds || []).forEach(sid => {
                    const pairKey = [p.id, sid].sort().join("-");
                    if (!seenSpouses.has(pairKey) && nodePos[p.id] && nodePos[sid]) {
                        seenSpouses.add(pairKey);
                        spouseLinks.push({ source: nodePos[p.id], target: nodePos[sid], type: 'spouse' });
                    }
                });
            });

            const linkGen = d3.linkVertical().x(d => d.x).y(d => d.y);
            const renderedLinks = zoomLayer.append("g");
            const allLinksSelection = renderedLinks.selectAll("path").data([...fatherLinks, ...motherLinks, ...spouseLinks]).enter().append("path")
                .attr("class", d => `link ${d.type}`)
                .attr("d", d => {
                    if (d.type === 'spouse') return `M ${d.source.x} ${d.source.y} L ${d.target.x} ${d.target.y}`;
                    return linkGen({ source: { x: d.source.x, y: d.source.y + cardHeight/2 }, target: { x: d.target.x, y: d.target.y - cardHeight/2 } });
                });

            const nodeGroup = zoomLayer.append("g");
            const cards = nodeGroup.selectAll(".node").data(allNodes).enter().append("g")
                .attr("class", d => {
                    let roleClass = d.data.gender;
                    // Determine if daughter or spouse for coloring
                    if (d.data.gender === 'female') {
                        if (d.data.motherId || d.data.fatherId) {
                            roleClass = 'female-daughter';
                        } else if (d.data.spouseIds && d.data.spouseIds.length > 0) {
                            roleClass = 'female-spouse';
                        } else {
                            // Fallback to general female if no parent/spouse data yet
                            roleClass = 'female';
                        }
                    }
                    return `node-card ${roleClass}`;
                })
                .attr("transform", d => `translate(${d.x - cardWidth/2}, ${d.y - cardHeight/2})`)
                .on("click", function(event, d) {
                    event.stopPropagation();
                    d3.selectAll(".node-card").classed("active", false);
                    d3.select(this).classed("active", true);
                    showDetails(d.data);
                    focusOnNode(d);
                    highlightLineage(d);
                });

            cards.append("rect").attr("width", cardWidth).attr("height", cardHeight);
            
            const avatarGroup = cards.append("g").attr("transform", "translate(15, 20)");
            avatarGroup.append("circle").attr("r", 22).attr("cx", 22).attr("cy", 22).attr("fill", "#00000010");
            avatarGroup.each(function(d) {
                const g = d3.select(this);
                if (d.data.photo) {
                    const cid = `clip-${d.data.id}`;
                    g.append("defs").append("clipPath").attr("id", cid).append("circle").attr("cx", 22).attr("cy", 22).attr("r", 22);
                    g.append("image").attr("href", d.data.photo).attr("width", 44).attr("height", 44).attr("clip-path", `url(#${cid})`).attr("preserveAspectRatio", "xMidYMid slice");
                } else {
                    let emoji = d.data.gender === 'male' ? '👨' : '👩';
                    g.append("text").attr("x", 22).attr("y", 28).attr("text-anchor", "middle").attr("font-size", "18px").attr("fill", "#64748b").text(emoji);
                }
            });

            cards.append("text").attr("x", 72).attr("y", 38).attr("font-size", "14px").attr("font-weight", "700").attr("fill", "#1e293b").text(d => d.data.name);
            cards.append("text").attr("x", 72).attr("y", 58).attr("font-size", "11px").attr("fill", "#94a3b8").text(d => `${d.data.born || '?'}${d.data.died ? ' — ' + d.data.died : ''}`);

            function highlightLineage(targetNode) {
                const lineage = new Set();
                const traceUp = (id) => {
                    if (!id || lineage.has(id)) return;
                    lineage.add(id);
                    const p = familyData.find(x => x.id == id);
                    if (p) { traceUp(p.fatherId); traceUp(p.motherId); }
                };
                const traceDown = (id) => {
                    if (!id || lineage.has(id)) return;
                    lineage.add(id);
                    familyData.forEach(c => { if (c.fatherId == id || c.motherId == id) traceDown(c.id); });
                };
                traceUp(targetNode.data.id);
                traceDown(targetNode.data.id);
                const expanded = new Set(lineage);
                lineage.forEach(id => {
                    const p = familyData.find(x => x.id == id);
                    if (p?.spouseIds) p.spouseIds.forEach(sid => expanded.add(sid));
                });
                cards.classed("dimmed", n => !expanded.has(n.data.id));
                allLinksSelection.classed("highlighted", l => expanded.has(l.source.data.id) && expanded.has(l.target.data.id));
            }

            function resetHighlight() {
                cards.classed("dimmed", false);
                allLinksSelection.classed("highlighted", false);
            }

            window.showDetails = function(p) {
                const panel = document.getElementById("details-panel");
                const content = document.getElementById("details-content");
                const backdrop = document.getElementById("backdrop");
                panel.classList.add("open");
                if (isMobile()) backdrop.classList.add("visible");
                
                content.innerHTML = `
                    <div class="detail-header">
                        <button onclick="closeDetails()" class="absolute right-6 top-6 md:hidden text-white/50"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        <div class="w-24 h-24 mx-auto bg-white/20 rounded-full flex items-center justify-center text-5xl mb-5 border-4 border-white/20 overflow-hidden">
                            ${p.photo ? `<img src="${p.photo}" class="w-full h-full object-cover">` : (p.gender === 'male' ? '👨' : '👩')}
                        </div>
                        <h2 class="text-2xl font-extrabold px-6">${p.name}</h2>
                        <p class="text-white/40 text-[10px] uppercase font-black mt-2">${p.gender} • Generation ${nodePos[p.id].depth}</p>
                    </div>
                    <div class="p-8 md:p-10 space-y-8 pb-24">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                <span class="block text-[9px] uppercase font-black text-slate-400 mb-1">Born</span>
                                <span class="text-slate-800 font-bold">${p.born || 'Unknown'}</span>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                <span class="block text-[9px] uppercase font-black text-slate-400 mb-1">Passed</span>
                                <span class="text-slate-800 font-bold">${p.died || 'Present'}</span>
                            </div>
                        </div>
                        <div>
                            <span class="block text-[9px] uppercase font-black text-slate-400 mb-2">Biography</span>
                            <p class="text-slate-600 leading-relaxed text-sm">${p.bio || "No biography provided for this family member."}</p>
                        </div>
                        <div class="space-y-4 pt-6 border-t border-slate-100">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">📍</div>
                                <div><span class="block text-[9px] uppercase font-black text-slate-400">Location</span><span class="text-slate-800 text-sm font-bold">${p.location || 'Unknown'}</span></div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">💼</div>
                                <div><span class="block text-[9px] uppercase font-black text-slate-400">Occupation</span><span class="text-slate-800 text-sm font-bold">${p.occupation || 'N/A'}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            };

            window.closeDetails = function() {
                document.getElementById("details-panel").classList.remove("open");
                document.getElementById("backdrop").classList.remove("visible");
            };

            function focusOnNode(d) {
                const scale = isMobile() ? 0.8 : 1.4;
                const tx = (svg.node().clientWidth / 2) - d.x * scale;
                const ty = (svg.node().clientHeight / 2 - (isMobile() ? 100 : 0)) - d.y * scale;
                svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
            }

            // Search
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            searchInput.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                if (val.length < 1) { searchResults.classList.add('hidden'); return; }
                const matches = familyData.filter(p => p.name.toLowerCase().includes(val)).slice(0, 8);
                if (matches.length > 0) {
                    searchResults.innerHTML = matches.map(m => `<div class="p-4 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0 flex items-center gap-4" data-id="${m.id}"><div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden">${m.photo ? `<img src="${m.photo}" class="w-full h-full object-cover">` : '👤'}</div><div class="text-sm font-bold text-slate-800">${m.name}</div></div>`).join('');
                    searchResults.classList.remove('hidden');
                } else { searchResults.classList.add('hidden'); }
            });
            searchResults.addEventListener('click', (e) => {
                const item = e.target.closest('[data-id]');
                if (item) {
                    const id = item.getAttribute('data-id');
                    const node = allNodes.find(n => n.data.id == id);
                    if (node) { focusOnNode(node); showDetails(node.data); highlightLineage(node); }
                    searchResults.classList.add('hidden'); searchInput.value = '';
                }
            });

            genSelect.addEventListener('change', (e) => {
                const val = e.target.value;
                resetHighlight();
                if (val === 'all') { cards.classed("dimmed", false); allLinksSelection.classed("dimmed", false); }
                else {
                    const d = parseInt(val);
                    cards.classed("dimmed", n => n.depth !== d);
                    allLinksSelection.classed("dimmed", l => l.source.depth !== d && l.target.depth !== d);
                }
            });

            svg.call(zoom.transform, d3.zoomIdentity.translate(svg.node().clientWidth/2, 100).scale(isMobile() ? 0.35 : 0.75));
        });
    </script>
</body>
</html>
